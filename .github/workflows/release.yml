name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build x86_64 binary
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            crystallang/crystal:latest-alpine \
            sh -c "
              shards install --without-development && \
              crystal build src/meridian_cli.cr --release --static \
                -o meridian-${{ steps.version.outputs.VERSION }}-linux-x86_64 && \
              llvm-strip meridian-${{ steps.version.outputs.VERSION }}-linux-x86_64
            "

      - name: Build arm64 binary
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$PWD":/workspace \
            -w /workspace \
            crystallang/crystal:latest-alpine \
            sh -c "
              shards install --without-development && \
              crystal build src/meridian_cli.cr --release --static \
                -o meridian-${{ steps.version.outputs.VERSION }}-linux-arm64 && \
              llvm-strip meridian-${{ steps.version.outputs.VERSION }}-linux-arm64
            "

      - name: Generate checksums
        run: |
          sha256sum \
            meridian-${{ steps.version.outputs.VERSION }}-linux-x86_64 \
            meridian-${{ steps.version.outputs.VERSION }}-linux-arm64 \
            > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meridian-${{ steps.version.outputs.VERSION }}-linux-x86_64
            meridian-${{ steps.version.outputs.VERSION }}-linux-arm64
            checksums.txt
          generate_release_notes: true
